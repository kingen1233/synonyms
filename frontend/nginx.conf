server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API proxy ──────────────────────────────────────────────────────────────
    # BACKEND_URL is injected at container start via envsubst (see Dockerfile).
    # • Local Docker Compose: http://backend:8080
    # • Render private network: http://<service-name>:8080
    location /api/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    # Any path that doesn't match a real file is served as index.html so
    # React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
