services:

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # CORS is not needed when the frontend nginx proxies /api/* to this
      # container (same origin from the browser's perspective), but keeping
      # the list explicit makes local curl/Swagger testing easier.
      AllowedOrigins__0: http://localhost
    ports:
      - "8080:8080"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Relative base URL: axios will send /api/... requests which nginx
        # proxies to the backend container on the shared Docker network.
        VITE_API_URL: /
    environment:
      # Matches the Docker Compose service name defined above.
      BACKEND_URL: http://backend:8080
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started
