services:
  # ── Backend (Docker Web Service) ─────────────────────────────────────────────
  - type: web
    name: synonyms-backend
    runtime: docker
    # Path is relative to the repo root.
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Render health-checks the PORT it injects (default 10000).
      # Override ASP.NET Core's listen address to match.
      - key: ASPNETCORE_URLS
        value: http://+:10000
      # CORS: allow the static frontend origin (and local dev) to call the API.
      # AllowedOrigins is read as an array in Program.cs via IConfiguration.
      # ⚠️  After your first deploy, replace the placeholder below with the real
      #     https://synonyms-frontend.onrender.com URL and redeploy.
      - key: AllowedOrigins__0
        value: http://localhost:5173
      - key: AllowedOrigins__1
        value: https://synonyms-frontend.onrender.com   # TODO: update if name differs

  # ── Frontend (Static Site – free tier) ───────────────────────────────────────
  # Render builds the Vite app on their servers and serves it from their global
  # CDN. No Docker needed; VITE_API_URL is baked in at build time.
  - type: static
    name: synonyms-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # ⚠️  Replace with your real backend URL after the first backend deploy.
      - key: VITE_API_URL
        value: https://synonyms-backend.onrender.com
